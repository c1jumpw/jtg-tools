const grid=document.getElementById('grid');
const countEl=document.getElementById('count');
let activeFilter='all';
let searchVal='';

function render(){
  let list=S.filter(s=>{
    const matchF=activeFilter==='all'||s.tags.includes(activeFilter);
    const q=searchVal.toLowerCase();
    const matchS=!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.bestFor.toLowerCase().includes(q);
    return matchF&&matchS;
  });
  countEl.textContent=`Showing ${list.length} of ${S.length} styles`;
  grid.innerHTML='';
  if(!list.length){
    grid.innerHTML='<div class="no-results">No styles match — try a different search or filter.</div>';
    return;
  }
  list.forEach(s=>{
    const c=document.createElement('div');
    c.className='card';
    const cleanPrompt=s.prompt.replace(/<b>/g,'').replace(/<\/b>/g,'');
    c.innerHTML=`
      <div class="card-top" style="background:${s.accent};color:${s.accentText}">${s.name}</div>
      <div class="card-body">
        <div class="name-row">
          <span class="style-name">${s.name}</span>
          <span class="best-badge">${s.bestFor.split(',')[0].split('–')[0].trim()}</span>
        </div>
        <p class="desc">${s.desc}</p>
        <div><div class="lbl">Typography</div><div class="pills">${s.typo.map(t=>`<span class="pill">${t}</span>`).join('')}</div></div>
        <div><div class="lbl">Info layout</div><div class="pills">${s.info.map(t=>`<span class="pill">${t}</span>`).join('')}</div></div>
        <div><div class="lbl">Palette</div><div class="pills">${s.palette.map(t=>`<span class="pill">${t}</span>`).join('')}</div></div>
        <div>
          <div class="lbl" style="margin-bottom:5px">Prompt template</div>
          <div class="prompt-wrap"><p class="prompt-text">${s.prompt}</p></div>
          <div class="actions">
            <button class="cbtn" onclick="doCopy(this,'${encodeURIComponent(cleanPrompt)}')"><i class="ti ti-copy" aria-hidden="true"></i> Copy prompt</button>
            <button class="cbtn" onclick="sendPrompt('Tell me more about the ${s.name} flyer style and give me 3 variations of its prompt template')">Explore ↗</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(c);
  });
}

function doCopy(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{
    btn.textContent='✓ Copied';
    setTimeout(()=>{ btn.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy prompt'; },1500);
  });
}

document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.tag-btn');
  if(!b)return;
  document.querySelectorAll('.tag-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  activeFilter=b.dataset.f;
  render();
});

document.getElementById('search').addEventListener('input',e=>{
  searchVal=e.target.value;
  render();
});

render();
</script>
