<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MKC Lead Magnet Matrix</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-2: #f5f5f3; --bg-3: #e8e8e5;
    --text: #1a1a18; --text-2: #6b6b66; --text-3: #9e9e98;
    --border: rgba(0,0,0,0.11); --border-2: rgba(0,0,0,0.2);
    --pill-bg: #e6f1fb; --pill-text: #0c447c; --pill-border: rgba(24,95,165,0.28);
    --info-bg: #e6f1fb; --info-text: #0c447c;
    --danger-bg: #fcebeb; --danger-text: #a32d2d;
    --success-bg: #eaf3de; --success-text: #3b6d11;
    --warning-bg: #faeeda; --warning-text: #854f0b;
    --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg-2: #2a2a28; --bg-3: #333330;
      --text: #f0f0eb; --text-2: #a0a09a; --text-3: #6b6b66;
      --border: rgba(255,255,255,0.09); --border-2: rgba(255,255,255,0.18);
      --pill-bg: #0c2a45; --pill-text: #85b7eb; --pill-border: rgba(55,138,221,0.32);
      --info-bg: #0c2a45; --info-text: #85b7eb;
      --danger-bg: #2d1010; --danger-text: #f09595;
      --success-bg: #152208; --success-text: #97c459;
      --warning-bg: #2a1e07; --warning-text: #fac775;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-2); color: var(--text); min-height: 100vh; padding: 2rem 1.5rem; }

  header { max-width: 1060px; margin: 0 auto 1.5rem; }

  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 6px; }

  .header-titles h1 { font-size: 22px; font-weight: 500; line-height: 1.3; }
  .header-titles p { font-size: 13px; color: var(--text-2); margin-top: 5px; line-height: 1.6; max-width: 540px; }

  .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  #total-count { font-size: 13px; color: var(--text-2); }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 5px 11px;
    border-radius: var(--radius-md); border: 0.5px solid var(--border-2);
    background: var(--bg); color: var(--text-2);
    cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap;
    text-decoration: none;
  }
  .btn:hover { background: var(--bg-3); color: var(--text); }
  .btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .btn.primary { background: var(--info-bg); color: var(--info-text); border-color: var(--pill-border); }
  .btn.primary:hover { opacity: 0.82; }
  .btn.sheet { background: var(--success-bg); color: var(--success-text); border-color: rgba(59,109,17,0.25); }
  .btn.sheet:hover { opacity: 0.82; }

  .card { max-width: 1060px; margin: 0 auto; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th, td { border: 0.5px solid var(--border); vertical-align: top; }
  th.corner { width: 78px; background: var(--bg-2); }
  th.lead-head { background: var(--bg-2); padding: 10px 12px; font-size: 12px; font-weight: 500; color: var(--text); text-align: left; min-width: 200px; }
  th.branch-head { background: var(--bg-2); padding: 10px 6px; font-size: 10px; font-weight: 500; color: var(--text-2); text-align: center; letter-spacing: 0.04em; text-transform: uppercase; width: 78px; }
  td.cell { padding: 6px 8px; background: var(--bg); }

  .pills-wrap { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 3px; min-height: 30px; }
  .pill {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--pill-bg); color: var(--pill-text);
    border: 0.5px solid var(--pill-border); border-radius: 20px;
    font-size: 11px; padding: 3px 7px 3px 9px; white-space: nowrap;
    cursor: pointer; transition: opacity 0.15s;
  }
  .pill:hover { opacity: 0.82; }
  .pill .x { background: none; border: none; cursor: pointer; color: var(--pill-text); font-size: 14px; line-height: 1; padding: 0 0 0 1px; opacity: 0.5; }
  .pill .x:hover { opacity: 1; }

  .add-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border: 0.5px dashed var(--border-2);
    border-radius: 50%; background: none; cursor: pointer;
    color: var(--text-3); font-size: 16px; line-height: 1;
    transition: all 0.15s; flex-shrink: 0; margin-top: 1px;
  }
  .add-btn:hover { border-color: var(--text-2); color: var(--text-2); background: var(--bg-2); }

  .status-bar { max-width: 1060px; margin: 8px auto 0; display: flex; align-items: center; justify-content: flex-end; gap: 8px; min-height: 20px; }
  .status-msg { font-size: 11px; color: var(--text-3); }
  .status-msg.ok { color: var(--success-text); }
  .status-msg.err { color: var(--danger-text); }
  .spinner { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border-2); border-top-color: var(--pill-text); animation: spin 0.7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.38); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border-2); padding: 1.5rem; width: 100%; }
  .modal.sm { max-width: 340px; }
  .modal.lg { max-width: 520px; }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .modal .sub { font-size: 12px; color: var(--text-2); margin-bottom: 16px; line-height: 1.6; }
  .modal label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 5px; }
  .modal input {
    width: 100%; font-size: 13px; padding: 8px 10px;
    border-radius: var(--radius-md); border: 0.5px solid var(--border-2);
    background: var(--bg-2); color: var(--text); font-family: inherit;
  }
  .modal input:focus { outline: 2px solid var(--pill-text); outline-offset: 1px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .hint-box { font-size: 11px; color: var(--text-3); margin-top: 10px; padding: 9px 11px; background: var(--bg-2); border-radius: var(--radius-md); line-height: 1.7; }
  .hint-box a { color: var(--pill-text); }

  .detail-grid { display: grid; grid-template-columns: 90px 1fr; gap: 8px 12px; font-size: 13px; margin-top: 10px; }
  .detail-label { color: var(--text-2); font-size: 12px; padding-top: 1px; }
  .detail-val { color: var(--text); line-height: 1.5; }
  .detail-val a { color: var(--pill-text); word-break: break-all; }
  .detail-val.empty { color: var(--text-3); font-style: italic; }
  .sheet-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--pill-text); margin-top: 14px; text-decoration: none; }
  .sheet-link svg { width: 12px; height: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-titles">
      <h1>MKC Lead Magnet Matrix</h1>
      <p>A reference tool for mapping lead magnets across branches and lead types. Use the <strong>+</strong> button in any cell to assign a lead magnet to a scenario. Click any entry to view its details or open the master sheet to add descriptions and resource links.</p>
    </div>
    <div class="header-actions">
      <span id="total-count"></span>
      <a class="btn sheet" href="https://docs.google.com/spreadsheets/d/1w1os7t-OOutiZHtt00jtNkJTH-PgJlGVPHISqr0y_Kw/edit?gid=1249671034#gid=1249671034" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Master sheet
      </a>
      <button class="btn" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.32"/></svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<div class="card"><table id="matrix-table"></table></div>

<div class="status-bar">
  <div class="spinner" id="spinner"></div>
  <div class="status-msg" id="status-msg"></div>
</div>

<div id="modal-root"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0SwQ1Wgu1anj1W78DTar8_V9DL8fOh4otUFcoGruwb-otaRi4-UtKTVxS5gtfO-8e1A/exec';
const SHEET_URL  = 'https://docs.google.com/spreadsheets/d/1w1os7t-OOutiZHtt00jtNkJTH-PgJlGVPHISqr0y_Kw/edit?gid=1249671034#gid=1249671034';

const BRANCHES = ['BMS','F5','PD','BB','BCM','Anvil','MCO INV','Uny','F5 CEO','SD','BC','MBC','ACAD','BLM','BLK'];
const LEADS    = ['Potential client','Supporter','Partner'];

let rows = [];
let activeModal = null;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function setStatus(msg, type) {
  var el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}
function busy(on) { document.getElementById('spinner').style.display = on ? 'block' : 'none'; }

async function apiCall(params) {
  var qs = new URLSearchParams(params).toString();
  try {
    var res = await fetch(SCRIPT_URL + '?' + qs);
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Script error');
    return json;
  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
    return null;
  }
}

async function loadData() {
  busy(true); setStatus('Loading\u2026');
  var res = await apiCall({action:'read'});
  if (res) {
    rows = res.data || [];
    setStatus('Loaded \u2713', 'ok');
    setTimeout(function(){ setStatus(''); }, 2000);
  }
  render(); busy(false);
}

async function addEntry(branch, leadType, name) {
  busy(true); setStatus('Saving\u2026');
  var res = await apiCall({action:'add', branch:branch, leadType:leadType, name:name});
  if (res) {
    rows.push({branch:branch, leadType:leadType, name:name, description:'', dateAdded:'', link:''});
    setStatus('Saved to sheet \u2713', 'ok');
    setTimeout(function(){ setStatus(''); }, 2000);
  }
  render(); busy(false);
}

async function deleteEntry(branch, leadType, name) {
  busy(true); setStatus('Removing\u2026');
  var res = await apiCall({action:'delete', branch:branch, leadType:leadType, name:name});
  if (res) {
    rows = rows.filter(function(r){ return !(r.branch===branch && r.leadType===leadType && r.name===name); });
    setStatus('Removed \u2713', 'ok');
    setTimeout(function(){ setStatus(''); }, 2000);
  }
  render(); busy(false);
}

function render() {
  var tbl = document.getElementById('matrix-table');
  var heads = LEADS.map(function(l){ return '<th class="lead-head">' + esc(l) + '</th>'; }).join('');

  var bodyRows = BRANCHES.map(function(branch) {
    var cells = LEADS.map(function(lead) {
      var items = rows.filter(function(r){ return r.branch===branch && r.leadType===lead; });
      var pills = items.map(function(item) {
        return '<span class="pill" onclick="openDetail(\'' + escA(item.branch) + '\',\'' + escA(item.leadType) + '\',\'' + escA(item.name) + '\')" title="View details">' +
          esc(item.name) +
          '<button class="x" onclick="event.stopPropagation();confirmRemove(\'' + escA(item.branch) + '\',\'' + escA(item.leadType) + '\',\'' + escA(item.name) + '\')" title="Remove">\xd7</button>' +
        '</span>';
      }).join('');
      return '<td class="cell"><div class="pills-wrap">' + pills +
        '<button class="add-btn" onclick="openAdd(\'' + escA(branch) + '\',\'' + escA(lead) + '\')" title="Add lead magnet">+</button>' +
        '</div></td>';
    }).join('');
    return '<tr><th class="branch-head">' + esc(branch) + '</th>' + cells + '</tr>';
  }).join('');

  tbl.innerHTML = '<thead><tr><th class="corner"></th>' + heads + '</tr></thead><tbody>' + bodyRows + '</tbody>';
  var n = rows.length;
  document.getElementById('total-count').textContent = n + ' lead magnet' + (n !== 1 ? 's' : '');
}

function openAdd(branch, lead) {
  closeModal();
  showModal('sm',
    '<h3>Add lead magnet</h3>' +
    '<div class="sub">' + esc(branch) + ' \u2014 ' + esc(lead) + '</div>' +
    '<label>Name</label>' +
    '<input id="lm-input" placeholder="e.g. Free BMS checklist" autocomplete="off" />' +
    '<div class="hint-box">Description, date, and resource link can be filled in the <a href="' + SHEET_URL + '" target="_blank">master sheet</a> after saving.</div>' +
    '<div class="modal-btns">' +
    '<button class="btn" onclick="closeModal()">Cancel</button>' +
    '<button class="btn primary" onclick="commitAdd(\'' + escA(branch) + '\',\'' + escA(lead) + '\')">Add to sheet</button>' +
    '</div>',
    function() {
      var inp = document.getElementById('lm-input');
      if (inp) { inp.focus(); inp.addEventListener('keydown', function(e){ if(e.key==='Enter') commitAdd(branch,lead); if(e.key==='Escape') closeModal(); }); }
    }
  );
}

function commitAdd(branch, lead) {
  var inp = document.getElementById('lm-input');
  if (!inp) return;
  var val = inp.value.trim();
  if (!val) return;
  closeModal();
  addEntry(branch, lead, val);
}

function openDetail(branch, leadType, name) {
  var item = rows.find(function(r){ return r.branch===branch && r.leadType===leadType && r.name===name; });
  if (!item) return;
  closeModal();
  var descVal = item.description ? esc(item.description) : '<span class="empty">Not added yet</span>';
  var dateVal = item.dateAdded   ? esc(item.dateAdded)   : '<span class="empty">\u2014</span>';
  var linkVal = item.link        ? '<a href="' + esc(item.link) + '" target="_blank">' + esc(item.link) + '</a>' : '<span class="empty">Not added yet</span>';

  showModal('lg',
    '<h3>' + esc(name) + '</h3>' +
    '<div class="sub">' + esc(branch) + ' \u2014 ' + esc(leadType) + '</div>' +
    '<div class="detail-grid">' +
      '<span class="detail-label">Description</span><span class="detail-val">' + descVal + '</span>' +
      '<span class="detail-label">Date added</span><span class="detail-val">' + dateVal + '</span>' +
      '<span class="detail-label">Resource</span><span class="detail-val">' + linkVal + '</span>' +
    '</div>' +
    '<a class="sheet-link" href="' + SHEET_URL + '" target="_blank">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
      'Edit details in master sheet' +
    '</a>' +
    '<div class="modal-btns">' +
    '<button class="btn" onclick="closeModal()">Close</button>' +
    '<button class="btn" style="color:var(--danger-text);border-color:var(--danger-text)" onclick="closeModal();confirmRemove(\'' + escA(branch) + '\',\'' + escA(leadType) + '\',\'' + escA(name) + '\')">Remove</button>' +
    '</div>'
  );
}

function confirmRemove(branch, leadType, name) {
  closeModal();
  showModal('sm',
    '<h3>Remove lead magnet?</h3>' +
    '<div class="sub">This will delete <strong>' + esc(name) + '</strong> from the sheet. This cannot be undone.</div>' +
    '<div class="modal-btns">' +
    '<button class="btn" onclick="closeModal()">Cancel</button>' +
    '<button class="btn" style="background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-text)" onclick="closeModal();deleteEntry(\'' + escA(branch) + '\',\'' + escA(leadType) + '\',\'' + escA(name) + '\')">Yes, remove</button>' +
    '</div>'
  );
}

function showModal(size, html, onOpen) {
  var ov = document.createElement('div');
  ov.className = 'overlay';
  var m = document.createElement('div');
  m.className = 'modal ' + (size||'sm');
  m.innerHTML = html;
  ov.appendChild(m);
  ov.addEventListener('click', function(e){ if(e.target===ov) closeModal(); });
  document.getElementById('modal-root').appendChild(ov);
  activeModal = ov;
  if (onOpen) setTimeout(onOpen, 30);
}
function closeModal() { if(activeModal){ activeModal.remove(); activeModal=null; } }

render();
loadData();
</script>
</body>
</html>
