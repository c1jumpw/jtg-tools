<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party flyer style index</title>
<style>
:root{
  --bg:#faf9f6;
  --surface:#ffffff;
  --surface-2:#f3f1ec;
  --border:#e4e1d8;
  --border-light:#d2cdbf;
  --text-primary:#211f1a;
  --text-secondary:#6b6658;
  --text-tertiary:#9b9586;
  --accent-default:#534ab7;
  --radius-md:8px;
  --radius-lg:14px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:var(--font-sans);
  line-height:1.5;
  padding:2.5rem 1.25rem 4rem;
}
.page{max-width:1100px;margin:0 auto}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
header{margin-bottom:1.75rem}
h1{font-size:26px;font-weight:600;letter-spacing:-0.01em;margin-bottom:6px}
header p{font-size:14px;color:var(--text-secondary)}

.controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text-tertiary);pointer-events:none}
#search{
  width:100%;padding:9px 12px 9px 36px;font-size:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  color:var(--text-primary);outline:none;
}
#search:focus{border-color:var(--border-light)}
#search::placeholder{color:var(--text-tertiary)}
#count{font-size:13px;color:var(--text-tertiary);white-space:nowrap}

#filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.75rem}
.fbtn{
  font-size:13px;padding:7px 15px;border-radius:999px;
  border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);
  cursor:pointer;transition:background .12s,color .12s,border-color .12s;
}
.fbtn:hover{border-color:var(--border-light)}
.fbtn.active{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}

#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}

.flycard{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 1px 2px rgba(33,31,26,0.04);
  transition:box-shadow .15s,border-color .15s;
}
.flycard:hover{
  box-shadow:0 4px 14px rgba(33,31,26,0.08);
  border-color:var(--border-light);
}
.swatch{height:5px}
.fbody{padding:16px 18px 18px;display:flex;flex-direction:column;gap:11px;flex:1}
.toprow{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.sname{font-size:17px;font-weight:600;color:var(--text-primary)}
.bestfor{font-size:12px;color:var(--text-tertiary);text-align:right;flex-shrink:0}
.sdesc{font-size:13.5px;color:var(--text-secondary);line-height:1.6}

.pillrow{display:flex;flex-wrap:wrap;gap:6px}
.pill{
  font-size:11px;padding:4px 9px;border-radius:6px;
  background:var(--surface-2);color:var(--text-secondary);border:1px solid var(--border);
}

.promptbox{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:11px 13px;margin-top:2px}
.promptlbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.promptlbl span{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em}
.copybtn{
  font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border-light);
  background:var(--surface);color:var(--text-secondary);display:inline-flex;align-items:center;gap:5px;cursor:pointer;
  transition:background .12s,color .12s;
}
.copybtn svg{width:13px;height:13px}
.copybtn:hover{background:var(--surface-2);color:var(--text-primary)}
.copybtn.copied{color:#1f7a45;border-color:#bfe2cc;background:#eef8f1}
.prompttext{font-family:var(--font-mono);font-size:11.5px;line-height:1.65;color:var(--text-primary);white-space:pre-wrap}

.exploretab{
  font-size:12.5px;color:var(--text-secondary);background:none;border:none;
  text-align:left;padding:0;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
}
.exploretab svg{width:13px;height:13px;stroke:currentColor}
.exploretab:hover{color:var(--text-primary)}

.noresults{
  font-size:13.5px;color:var(--text-tertiary);padding:3rem 0;text-align:center;grid-column:1/-1;
}
.noresults svg{width:22px;height:22px;display:block;margin:0 auto 8px;stroke:var(--text-tertiary)}

@media (max-width:480px){
  body{padding:1.75rem 1rem 3rem}
  h1{font-size:22px}
}
</style>
</head>

    const stripped=word.replace(/[^a-zA-Z'-]/g,'');
    const lower=stripped.toLowerCase();
    if(i!==0&&i!==arr.length-1&&MINOR_WORDS.has(lower)){
      return word.charAt(0).toLowerCase()+word.slice(1);
    }
    return word.split('-').map(capSegment).join('-');
  }).join(' ');
}

function render(){
  let list=S.filter(s=>{
    const matchF=activeFilter==='all'||s.tags.includes(activeFilter)||s.cat===activeFilter;
    const q=searchVal.toLowerCase();
    const matchS=!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.best.toLowerCase().includes(q);
    return matchF&&matchS;
  });
  countEl.textContent=list.length+' of '+S.length;
  grid.innerHTML='';
  if(!list.length){
    grid.innerHTML='<div class="noresults">'+emptyIcon+'No styles match. Try a different search or filter.</div>';
    return;
  }
  list.forEach((s,i)=>{
    const c=document.createElement('div');
    c.className='flycard';
    c.innerHTML=`
      <div class="swatch" style="background:${s.accent}"></div>
      <div class="fbody">
        <div class="toprow">
          <span class="sname">${toTitleCase(s.name)}</span>
          <span class="bestfor">${toTitleCase(s.best)}</span>
        </div>
        <p class="sdesc">${s.desc}</p>
        <div class="pillrow">${s.typo.map(t=>'<span class="pill">'+t+'</span>').join('')}</div>
        <div class="pillrow">${s.pal.map(t=>'<span class="pill">'+t+'</span>').join('')}</div>
        <div class="promptbox">
          <div class="promptlbl">
            <span>Prompt</span>
            <button class="copybtn" data-idx="${i}" aria-label="Copy prompt">${copyIcon}Copy</button>
          </div>
          <p class="prompttext">${s.prompt}</p>
        </div>
        <button class="exploretab" data-name="${s.name}">More variations of this style${arrowIcon}</button>
      </div>`;
    grid.appendChild(c);
  });
  grid.querySelectorAll('.copybtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.idx);
      navigator.clipboard.writeText(list[idx].prompt).then(()=>{
        btn.classList.add('copied');
        btn.innerHTML=checkIcon+'Copied';
        setTimeout(()=>{
          btn.classList.remove('copied');
          btn.innerHTML=copyIcon+'Copy';
        },1400);
      });
    });
  });
  grid.querySelectorAll('.exploretab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      alert('Ask: "Give me 3 prompt variations of the '+btn.dataset.name+' flyer style"');
    });
  });
}

document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.fbtn');
  if(!b)return;
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  activeFilter=b.dataset.f;
  render();
});
document.getElementById('filters').querySelector('[data-f="all"]').classList.add('active');

document.getElementById('search').addEventListener('input',e=>{
  searchVal=e.target.value;
  render();
});

render();
</script>
</body>
</html>
